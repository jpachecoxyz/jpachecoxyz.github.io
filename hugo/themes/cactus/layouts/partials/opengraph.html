{{ if .IsPage }}
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{ .Title }}" />
    <meta property="og:description" content="{{ .Params.description }}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="{{ .Permalink }}" />

    <!-- Open Graph Image Handling -->
    {{ if .Params.hugo_image }}
        <meta property="og:image" content="{{ .Params.hugo_image | absURL }}" />
    {{ else }}
        <!-- Use the fallback logo image -->
<meta property="og:image" content="{{ "https://og-theta.vercel.app/api/general?siteName=jpacheco.xyz&description=Welcome%20to%20my%20blog!&theme=dark&logo=https://github.com/jpachecoxyz/jpachecoxyz.github.io/blob/main/images/logo.jpg?raw=true&logoWidth=120" | absURL }}" />
    {{ end }}

    <!-- Twitter Cards (Optional) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ .Title }}" />
    <meta name="twitter:description" content="{{ .Params.description }}" />

    <!-- Twitter Image Handling -->
    {{ if .Params.hugo_image }}
        <meta name="twitter:image" content="{{ .Params.hugo_image | absURL }}" />
    {{ else }}
        <!-- Use the fallback logo image -->
        <meta name="twitter:image" content="{{ "https://og-theta.vercel.app/api/general?siteName=jpacheco.xyz&description=Welcome%20to%20my%20blog!&theme=dark&logo=https://github.com/jpachecoxyz/jpachecoxyz.github.io/blob/main/images/logo.jpg?raw=true&logoWidth=120" | absURL }}" />
    {{ end }}
{{ end }}
