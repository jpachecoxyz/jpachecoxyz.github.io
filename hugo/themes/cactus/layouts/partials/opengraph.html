{{ if .IsPage }}
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{ .Title }}" />
    <meta property="og:description" content="{{ .Params.description }}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="{{ .Permalink }}" />
    
    {{ if .Params.hugo_image }}
        <!-- Custom Image -->
        <meta property="og:image" content="{{ .Params.hugo_image | absURL }}" />
    {{ else }}
        <!-- Default Image -->
        <meta property="og:image" content="/images/thumbnails/logo.png" />
    {{ end }}
    
    <!-- Twitter Cards (Optional) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ .Title }}" />
    <meta name="twitter:description" content="{{ .Params.description }}" />
    <meta name="twitter:image" content="{{ .Params.hugo_image | absURL }}" />
{{ end }}
