baseURL: /
publishDir: ./docs
languageCode: en-us

title: jpachecoxyz

copyright: © jpachecoxyz

googleAnalytics:

pagination:
  pagerSize: 4
  # Specify the number of posts listed at home page

theme: minima
# Specify a theme to use

defaultContentLanguage: en
# Specify the default language

languages:
# Override language-specific configurations
  en:
    languageName: EN
    weight: 1

params:
# Define regular configurations

  greet: (λ jpachecoxyz)
  
  subtitle:
  
  defaultTheme: dark
  # Specify the default color theme, available values: light, sand, rock, system.

  displayDate: true

  displayDescription: true

  selectable: true

  author:
    name: Javier Pacheco
    status: Maintenance Engineer
    avatar: https://avatars.githubusercontent.com/u/174582218?v=4
    description: |
      I am maintenance engineer, I'm specialized in maintenance,
      programming PLC, Robotics, but also likes to programming, 
      I use linux and Guix as my daliy OS.

  social:
    - name: "email"
      url: "mailto:jpacheco@cock.li"
    - name: "github"
      url: "https://github.com/jpachecoxyz"
    - name: "rss"
      url: "index.xml"

  math:
    enable: true
    provider: katex

  diagram:
    enable: true
    provider: mermaid

  comment:
    enable: false
    provider: giscus

    disqus:
    # See also https://disqus.com
      shortname: hugo-minima

    utterances:
    # See also https://utteranc.es
      repo: mivinci/hugo-theme-minima
      issueTerm: pathname
      label: comment

    giscus: 
    # See also https://giscus.app
      repo: mivinci/hugo-theme-minima
      repoId: MDEwOlJlcG9zaXRvcnkzODcxMjM2NDU=
      category: Comments
      categoryId: DIC_kwDOFxMJvc4CScQm
      mapping: pathname
      inputPosition: buttom # bottom | top
      reactions: false
      metadata: false

  search:
    enable: true
    provider: fuse
    title: Search
    placeholder: Enter keywords

    fuse:
    # See also https://fusejs.io
      keys:
        - title
        - permalink
        - summary
        - content
      distance: 100
      location: 0
      threshold: 0.6
      ignoreLocation: false
      isCaseSensitive: false
      includeScore: false
      includeMatches: false
      minMatchCharLength: 1
      shouldSort: true
      findAllMatches: false

menu:
  main:
    - identifier: home
      name: Home
      weight: 1
    - identifier: about
      name: About
      weight: 2
    - identifier: wiki/wiki
      name: Wiki
      weight: 3
    - identifier: search
      name: Search
      weight: 4

taxonomies:
  category: categories
  tag: tags
  wiki: wiki

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
# **DO NOT EDIT** anything below. 
# Because unlike other Hugo themes, the way Minima uses to do syntax
# highlighting depends strongly on configurations below, so that the
# color theme of code blocks changes with the blog color theme, instead
# of being static like you may have seen on other Hugo themes.
  highlight:
    lineNos: true
    noClasses: false
